import:
    - recipe/laravel.php


config:
    repository: 'https://github.com/SanderArmus/Raamistikud.git'
    keep_releases: 2

hosts:
    stage:
        hostname: 'ta24armus.itmajakas.ee'
        http_user: virt137755
        remote_user: virt137755
        deploy_path: '~/domeenid/www.ta24armus.itmajakas.ee/raamistikud'

tasks:
    db:setup:
        - run: 'cd {{release_path}} && mkdir -p database && touch database/database.sqlite'
        - run: 'cd {{release_path}} && php artisan migrate --force'

    npm:production:
        - run: 'cd {{release_path}} && npm ci'
        - run: 'cd {{release_path}} && npx vite build'

    opcache:clear:
        - run: killall php84-cgi || true

    deploy:
        - 'deploy:prepare'
        - 'deploy:vendors'
        - 'db:setup'
        - 'npm:production'
        - 'artisan:storage:link'
        # - 'artisan:optimize:clear'
        # - 'artisan:optimize'
        - 'deploy:publish'

after:
    deploy:failed: deploy:unlock

before:
    deploy:success: opcache:clear
