import:
    - recipe/laravel.php


config:
    repository: 'https://github.com/SanderArmus/Raamistikud.git'
    keep_releases: 2
    ssh_multiplexing: false

hosts:
    stage:
        hostname: 'ta24armus.itmajakas.ee'
        http_user: virt137755
        remote_user: virt137755
        deploy_path: '~/domeenid/www.ta24armus.itmajakas.ee/raamistikud'

tasks:
    db:setup:
        # Persist SQLite across releases.
        # Create (or copy) the DB into shared/, then symlink it into the new release.
        - run: 'mkdir -p {{deploy_path}}/shared/database'
        - run: 'if [ ! -f {{deploy_path}}/shared/database/database.sqlite ] && [ -f {{deploy_path}}/current/database/database.sqlite ]; then cp {{deploy_path}}/current/database/database.sqlite {{deploy_path}}/shared/database/database.sqlite; fi'
        - run: 'touch {{deploy_path}}/shared/database/database.sqlite'
        - run: 'mkdir -p {{release_path}}/database && ln -sf {{deploy_path}}/shared/database/database.sqlite {{release_path}}/database/database.sqlite'
        - run: 'cd {{release_path}} && php artisan migrate --force'
        - run: 'cd {{release_path}} && count=$(php artisan tinker --no-interaction --execute="echo \\App\\Models\\Product::count();" | tr -d "\n") && if [ $count -eq 0 ]; then php artisan db:seed --force --class=ProductSeeder; fi'
        - run: 'cd {{release_path}} && count=$(php artisan tinker --no-interaction --execute="echo \\App\\Models\\MyFavoriteSubject::count();" | tr -d "\n") && if [ $count -eq 0 ]; then php artisan db:seed --force --class=MyFavoriteSubjectSeeder; fi'

    npm:production:
        - run: 'cd {{release_path}} && npm ci'
        - run: 'cd {{release_path}} && npx vite build'

    opcache:clear:
        - run: killall php84-cgi || true

    deploy:
        - 'deploy:prepare'
        - 'deploy:vendors'
        - 'db:setup'
        - 'npm:production'
        - 'artisan:storage:link'
        # - 'artisan:optimize:clear'
        # - 'artisan:optimize'
        - 'deploy:publish'

after:
    deploy:failed: deploy:unlock

before:
    deploy:success: opcache:clear
